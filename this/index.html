<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This keyword & examples</title>
</head>

<body class="bg-gray-900">
    <script src="https://cdn.tailwindcss.com"></script>
    <div class="flex items-center justify-center p-4 ">
        <form class="w-full max-w-md bg-gray-800 rounded-lg shadow-lg p-8 space-y-[18px]">
            <h1 class="text-2xl font-bold text-white mb-6">Add Users</h1>

            <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Name</label>
                <input id="userName" type="text" placeholder="Enter your name" required
                    class="w-full px-4 py-2 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Role</label>
                <input id="roleInput" type="text" placeholder="Enter your role" required
                    class="w-full px-4 py-2 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Bio</label>
                <textarea id="bioInput" placeholder="Enter your bio" rows="4" required
                    class="w-full px-4 py-2 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Photo URL</label>
                <input id="photoInput" type="url" placeholder="Enter photo URL" required
                    class="w-full px-4 py-2 bg-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button id="submitBtn" type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">ADD</button>
        </form>
    </div>

    <div class="container">

    </div>



    <div class="profiles flex items-center justify-center p-4 pt-12 gap-8">


    </div>


    <script src="script.js"></script>
</body>

</html>
